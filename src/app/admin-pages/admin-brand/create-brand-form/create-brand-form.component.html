<div class="container">
  <form [formGroup]="brandForm" class="createBrandForm" (ngSubmit)="onBrandSubmit($event)" novalidate>
    <h5 class="createBrandPage">Créer une Marques : </h5>
    <div class="nameBox mb-5">
      <label for="name" class="formLabel">Marque : </label>
      <input type="text" id="name" class="form-control" placeholder="Marque du véhicule" formControlName="name">
      @if (brandForm.get('name')?.hasError('required') && brandForm.get('name')?.touched) {
      <div class="form-error">brand is required</div>
      }
    </div>
    <div class="btnBox">
      <button title="btnValider" type="submit" class="btnSubmit">
        <img src="./../../../../assets/icons/done_outline_24dp_FILL0_wght400_GRAD0_opsz24.svg" alt="btnvalider">
      </button>
      <button title="btnCancel" type="button" class="btnCancel">
        <img src="./../../../../assets/icons/close_24dp_FILL0_wght400_GRAD0_opsz24.svg" alt="">
      </button>
    </div>
  </form>
</div>
