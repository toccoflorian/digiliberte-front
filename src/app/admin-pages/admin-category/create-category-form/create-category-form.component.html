<div class="container">
  <form [formGroup]="categoryForm" class="createCategoryForm" (ngSubmit)="onCategorySubmit($event)" novalidate>
    <h5 class="createCategoryPage">Créer une catégorie : </h5>
    <div class="nameBox mb-5">
      <label for="name" class="formLabel">Catégorie : </label>
      <input type="text" id="name" class="form-control" placeholder="Ctégorie du véhicule" formControlName="name">
      @if (categoryForm.get('name')?.hasError('required') && categoryForm.get('name')?.touched) {
      <div class="form-error">Model is required</div>
      }
    </div>
    <div class="seatsBox mb-5">
      <label for="seatsNumber" class="formLabel">Nombre de places du véhicule : </label>
      <input type="number" id="seatsNumber" class="form-control" placeholder="Nombre de place du véhicule"
        formControlName="seatsNumber">
      @if (categoryForm.get('seatsNumber')?.hasError('required') && categoryForm.get('seatsNumber')?.touched) {
      <div class="form-error">Seats number is required</div>
      }
    </div>
    <div class="btnBox">
      <button title="btnValider" type="submit" class="btnSubmit">
        <img src="./../../../../assets/icons/done_outline_24dp_FILL0_wght400_GRAD0_opsz24.svg" alt="btnvalider">
      </button>
      <button title="btnCancel" type="button" class="btnCancel">
        <img src="./../../../../assets/icons/close_24dp_FILL0_wght400_GRAD0_opsz24.svg" alt="">
      </button>
    </div>
  </form>
</div>
